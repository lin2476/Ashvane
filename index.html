<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Chat</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Chat">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f0f0f5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a0a10" media="(prefers-color-scheme: dark)">
  
  <link rel="manifest" id="pwa-manifest">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234f46e5' width='100' height='100' rx='22'/><text x='50' y='68' text-anchor='middle' font-size='52'>🤖</text></svg>">

  <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" defer></script>
  <!-- 引入官方的 marked-katex 扩展插件 -->
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js" defer></script>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css" id="hljs-theme">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js" defer></script>

  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="app">
  <!-- ASSISTANTS PAGE -->
  <div class="page active" id="ast-page">
    <div class="navbar">
      <div class="nav-left nav-spacer"></div>
      <div class="nav-center"><span class="asst-name">AI Chat</span></div>
      <div class="nav-right nav-spacer-right">
        <button class="nav-btn btn-transparent" id="add-group-btn" title="新建分组"><i class="ph ph-folder-plus"></i></button>
        <button class="nav-btn accent" id="add-ast-btn" title="新建助手"><i class="ph ph-plus"></i></button>
      </div>
    </div>
    <div class="scrollable-container">
      <div id="ast-list"></div>
    </div>
  </div>

  <!-- CHAT PAGE -->
  <div class="chat-page" id="chat-page">
    <div class="navbar">
      <div class="nav-left"><button class="nav-btn" id="chat-back"><i class="ph ph-arrow-left"></i></button></div>
      <div class="nav-center" id="chat-title-area">
        <span class="asst-name" id="chat-asst-name">助手</span>
        <div class="topic-row" id="topic-toggle">
          <span class="topic-name" id="chat-topic-name">新话题</span>
          <span class="nav-tokens" id="chat-nav-tokens">(0)</span>
          <span class="topic-arr"><i class="ph ph-caret-down"></i></span>
        </div>
      </div>
      <div class="nav-right"><button class="nav-btn" id="settings-btn" aria-label="打开设置"><i class="ph ph-gear"></i></button></div>
    </div>
    <div id="chat-container"><div id="messages"></div></div>
    <button class="scroll-down" id="scroll-down"><i class="ph ph-arrow-down"></i></button>
    <div id="input-bar">
      <div class="inp-wrap"><textarea id="user-input" rows="1" placeholder="输入消息，Enter 换行..." autofocus></textarea></div>
    </div>
    <div id="bottom-bar">
      <button id="model-chip-btn"><span class="micon"><i class="ph ph-brain"></i></span><span id="model-chip-label">模型</span> <i class="ph ph-caret-down"></i></button>
      <button id="reasoning-btn"><span id="reasoning-label">推理：关闭</span> <i class="ph ph-caret-down"></i></button>
      <button id="send-btn"><i class="ph-fill ph-paper-plane-right"></i></button>
      <button id="stop-btn" class="hidden"><i class="ph-fill ph-stop-circle"></i></button>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="edit-overlay" id="edit-overlay">
    <div class="edit-card">
      <div class="edit-card-header">
        <span class="edit-title"><i class="ph ph-pencil-simple"></i> 编辑消息</span>
        <button id="edit-toggle-reasoning-btn" class="edit-toggle-btn"><i class="ph ph-brain"></i> 思考过程</button>
      </div>
      <div class="edit-card-body">
        <textarea id="edit-reasoning-textarea" placeholder="输入思考过程…"></textarea>
        <textarea id="edit-textarea" placeholder="输入消息内容…"></textarea>
      </div>
      <div class="edit-card-foot">
        <button class="edit-cancel-btn" id="edit-cancel-btn">取消</button>
        <button class="edit-save-btn" id="edit-save-btn">保存</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-card">
      <div class="confirm-msg" id="confirm-msg">确定要执行此操作吗？</div>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="confirm-cancel">取消</button>
        <button class="confirm-ok" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <!-- CUSTOM PROMPT DIALOG -->
  <div class="confirm-overlay" id="custom-prompt-overlay">
    <div class="confirm-card">
      <div class="confirm-msg" id="custom-prompt-msg">请输入</div>
      <div class="field" style="margin-bottom:16px;"><input type="text" id="custom-prompt-input" style="text-align:center;"></div>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="custom-prompt-cancel">取消</button>
        <button class="confirm-ok" id="custom-prompt-ok">确定</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>

  <!-- TOPICS DRAWER: 改为 drawer-left (从左向右展开) -->
  <div class="drawer drawer-left" id="topics-drawer">
    <div class="drawer-head">
      <h3 class="flex-center"><i class="ph ph-list-dashes" style="margin-right:6px"></i> 历史话题 <span class="nav-tokens" id="drawer-total-tokens">0k</span></h3>
      <button class="nav-btn" id="close-topics"><i class="ph ph-x"></i></button>
    </div>
    <div class="drawer-body">
      <button class="new-topic-btn" id="new-topic"><i class="ph ph-plus"></i> 新建话题</button>
      <div id="topic-list"></div>
    </div>
  </div>

  <!-- SETTINGS DRAWER: 保持 drawer-right (从右向左展开) -->
  <div class="drawer drawer-right" id="settings-drawer">
    <div class="drawer-head"><h3><i class="ph ph-gear"></i> 设置</h3><button class="nav-btn" id="close-settings"><i class="ph ph-x"></i></button></div>
    <div class="drawer-body" id="settings-body"></div>
  </div>

  <!-- ADD ASSISTANT SHEET -->
  <div class="sheet" id="add-ast-sheet">
    <div class="sheet-handle"></div><div class="sheet-title">添加助手</div>
    <div class="sheet-body">
      <div class="field"><label>所属分组</label><select id="new-ast-group"></select></div>
      <div class="field"><label>助手名称</label><input type="text" id="new-ast-name" placeholder="如 编程助手"></div>
      <div class="field"><label>系统提示词</label><textarea id="new-ast-prompt" rows="3">你是一个高通用性、严谨且富有协作精神的AI助手。你的核心目标不是扮演特定角色，而是动态适配用户的真实需求。</textarea></div>
      <button class="btn-primary mt-8" id="create-ast"><i class="ph-fill ph-sparkle"></i> 创建助手</button>
    </div>
  </div>

  <!-- FULLSCREEN PROMPT EDITOR -->
  <div class="fs-prompt-overlay" id="fs-prompt-overlay">
    <div class="fs-prompt-head">
      <span class="prompt-title"><i class="ph ph-pencil-simple"></i> 编辑系统提示词</span>
      <button class="nav-btn" id="fs-prompt-close"><i class="ph ph-x"></i></button>
    </div>
    <div class="fs-prompt-body">
      <div class="prompt-toolbar" id="fs-prompt-tb">
        <button data-md="undo" title="撤销"><i class="ph ph-arrow-u-up-left"></i></button>
        <button data-md="redo" title="重做"><i class="ph ph-arrow-u-up-right"></i></button>
        <div style="width:1px;height:16px;background:var(--border-subtle);margin:0 4px;"></div>
        <button data-md="heading" title="标题">H</button>
        <button data-md="bold" title="粗体">B</button>
        <button data-md="list" title="列表">•</button>
        <button data-md="code" title="代码">&lt;/&gt;</button>
        <button data-md="quote" title="引用">❝</button>
        <button id="fs-prompt-save" title="保存并应用" class="btn-save-prompt"><i class="ph ph-floppy-disk"></i></button>
      </div>
      <textarea id="fs-prompt-textarea" placeholder="输入系统提示词…"></textarea>
    </div>
  </div>

  <div class="dropdown-menu" id="dropdown-menu"></div>
  <div class="toast" id="toast"></div>
  <input type="file" id="import-file" accept=".json" class="hidden">
</div>

<script src="./script.js" defer></script>
</body>
</html>
