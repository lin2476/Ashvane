<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Chat</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AI Chat">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f0f0f5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a0a10" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234f46e5' width='100' height='100' rx='22'/><text x='50' y='68' text-anchor='middle' font-size='52'>🤖</text></svg>">
  <link rel="manifest" id="pwa-manifest">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css" id="hljs-theme">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/languages/xml.min.js"></script>

  <style>
    :root {
      --bg-primary: #f0f0f5; --bg-secondary: #fafafa; --bg-tertiary: #eaeaef;
      --bg-bubble-user: #e2e8e4;
      --text-primary: #1a1a2e; --text-secondary: #8e8e9a;
      --accent: #4f46e5; --accent-light: #eef2ff; --danger: #ef4444; --success: #10b981;
      --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px;
      --header-h: 52px; --safe-b: env(safe-area-inset-bottom, 16px);
      --tr: .25s cubic-bezier(.4, 0, .2, 1);
      --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --border-subtle: rgba(128,128,128,.15); --border-soft: rgba(128,128,128,.08);
      --code-bg: #f5f5f5; --code-header-bg: rgba(0,0,0,0.03);
    }
    [data-theme="dark"] {
      --bg-primary: #0a0a10; --bg-secondary: #111118; --bg-tertiary: #1a1a26;
      --bg-bubble-user: #2a362f; --text-primary: #e4e4ed;
      --accent-light: #1e1b4b; --code-bg: #1a1a26; --code-header-bg: rgba(255,255,255,0.05);
    }

    /* Reset & Base */
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; width:100%; overflow:hidden; font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg-primary); color:var(--text-primary); -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
    #app { display:flex; flex-direction:column; height:100%; max-width:700px; margin:0 auto; position:relative; overflow:hidden; background:var(--bg-primary); }

    /* Flex Alignments */
    .navbar, .nav-left, .nav-right, .topic-row, .rhead, .code-block-header, .code-btns, #input-bar, #bottom-bar, #model-chip-btn, #reasoning-btn, .drawer-head, .ast-card, .ast-meta, .topic-item, .tact, .settings-fold-head, .prompt-toolbar, .fs-prompt-head, .slider-row, .t-row, .data-actions, .dropdown-item, .ttitle-wrap { display:flex; align-items:center; }
    .navbar, .drawer-head, .t-row, .code-block-header, .fs-prompt-head { justify-content:space-between; }
    
    /* Common Buttons */
    .nav-btn, #send-btn, #stop-btn, .topic-btn, .ast-del, .icon-btn, .scroll-down { display:flex; align-items:center; justify-content:center; border-radius:50%; border:none; cursor:pointer; transition:all var(--tr); flex-shrink:0; }
    .nav-btn:active, .icon-btn:active, #stop-btn:active, #send-btn:not(:disabled):active { transform:scale(.9); }
    .ast-card:active, .welcome-hint:active { transform:scale(.97); }
    .btn-primary, .confirm-actions button, .edit-card-foot button, .data-actions button { cursor:pointer; transition:all var(--tr); font-weight:600; border:none; }

    /* Inputs */
    .field input, .field textarea, .field select, .topic-rename-input { width:100%; padding:9px 12px; border:1.5px solid var(--border-subtle); border-radius:var(--radius-sm); background:var(--bg-tertiary); color:inherit; font-size:13px; font-family:inherit; outline:none; transition:border-color var(--tr); }
    .field input:focus, .field textarea:focus, .field select:focus, .topic-rename-input:focus { border-color:var(--accent); }

    /* Overlays & Modals */
    .edit-overlay, .confirm-overlay, .fs-prompt-overlay, .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; }
    .fs-prompt-overlay { background:var(--bg-secondary); z-index:400; flex-direction:column; }
    .edit-overlay { z-index:250; flex-direction:column; overscroll-behavior:none; }
    .confirm-overlay { z-index:500; align-items:center; justify-content:center; }
    .overlay { opacity:0; pointer-events:none; transition:opacity .3s; display:block; }
    .edit-overlay.show, .confirm-overlay.show, .fs-prompt-overlay.show, .overlay.show { opacity:1; pointer-events:auto; display:flex; }

    /* NAVBAR & TOKENS */
    .navbar { padding:6px 10px; background:var(--bg-secondary); border-bottom:0.5px solid var(--border-subtle); z-index:100; height:var(--header-h); flex-shrink:0; gap:4px; }
    .nav-left, .nav-right { gap:2px; flex-shrink:0; }
    .nav-center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:0; text-align:center; }
    .nav-center .asst-name { font-size:14px; font-weight:700; }
    .nav-center .topic-row { gap:4px; cursor:pointer; padding:1px 6px; border-radius:8px; transition:background var(--tr); }
    .nav-center .topic-row:active { background:var(--bg-tertiary); }
    .nav-center .topic-name { font-size:10px; color:var(--text-secondary); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .nav-center .topic-arr { font-size:8px; color:var(--text-secondary); }
    .nav-btn { width:34px; height:34px; background:var(--bg-tertiary); color:inherit; font-size:15px; }
    .nav-btn.accent { background:var(--accent); color:#fff; }
    .nav-tokens { font-size:9px; background:rgba(128,128,128,0.12); padding:2px 5px; border-radius:8px; color:var(--text-secondary); font-family:var(--mono); margin-left:4px; font-weight:600; line-height:1; }

    /* CHAT */
    #chat-container { flex:1; overflow-y:auto; overflow-x:hidden; padding:14px 12px; scroll-behavior:smooth; }
    #messages { display:flex; flex-direction:column; gap:8px; max-width:100%; }

    .welcome { flex-direction:column; align-items:center; justify-content:center; min-height:100%; padding:40px 20px; text-align:center; opacity:0; animation:fadeIn .4s .1s forwards; }
    @keyframes fadeIn { to { opacity:1; } }
    .welcome .emoji { font-size:48px; margin-bottom:10px; animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
    .welcome h3 { font-size:18px; font-weight:700; margin-bottom:4px; }
    .welcome p { color:var(--text-secondary); font-size:13px; margin-bottom:18px; }
    .welcome-hints { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:360px; }
    .welcome-hint { padding:12px; background:var(--bg-secondary); border-radius:var(--radius-md); font-size:13px; color:var(--text-secondary); cursor:pointer; transition:all var(--tr); text-align:left; line-height:1.4; border:1.5px solid transparent; }
    .welcome-hint:active { border-color:var(--accent); }

    /* MESSAGES */
    .msg { display:flex; flex-direction:column; max-width:88%; animation:msgIn .3s ease-out; }
    @keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .msg.user { align-self:flex-end; align-items:flex-end; } /* Added align-items to prevent stretching short texts */
    .msg.ai { align-self:flex-start; width:100%; max-width:100%; }
    .msg .bubble { padding:10px 14px; border-radius:var(--radius-lg); font-size:14.5px; line-height:1.65; word-break:break-word; position:relative; }
    .msg.user .bubble { background:var(--bg-bubble-user); border-bottom-right-radius:4px; box-shadow:0 1px 2px rgba(0,0,0,0.05); display:inline-block; max-width:100%; }
    .msg.ai .bubble { background:transparent; border-bottom-left-radius:6px; padding:10px 2px; }
    
    .rblock { margin-bottom:8px; border-radius:var(--radius-sm); overflow:hidden; background:var(--bg-tertiary); }
    .rhead { gap:6px; padding:7px 12px; background:var(--bg-tertiary); font-size:11px; font-weight:600; color:var(--text-secondary); cursor:pointer; border:none; width:100%; text-align:left; border-radius:var(--radius-sm); }
    .rhead .arr { transition:transform var(--tr); font-size:9px; margin-left:auto; }
    .rhead.open .arr { transform:rotate(90deg); }
    .rbody { padding:8px 12px; font-size:12px; line-height:1.5; color:var(--text-secondary); background:var(--bg-tertiary); border-top:1px solid var(--border-soft); max-height:180px; overflow-y:auto; display:none; font-style:italic; white-space:pre-wrap; }
    .rbody.open { display:block; }

    /* MESSAGE ACTIONS */
    .msg-actions { display:flex; align-items:center; width:100%; padding-top:4px; gap:6px; }
    .actions-left { flex:1; display:flex; min-width:0; justify-content:flex-start; align-items:center; }
    .actions-right { display:flex; justify-content:flex-end; gap:2px; flex-shrink:0; }
    .msg-tokens { font-size:10px; color:var(--text-secondary); opacity:0.65; font-family:var(--mono); white-space:nowrap; flex-shrink:0; margin-right:4px; }
    .actions-left .badge, .gen-time { font-size:10px; color:var(--text-secondary); opacity:.65; white-space:nowrap; }
    .actions-left .badge { letter-spacing:.3px; }
    .gen-time { font-family:var(--mono); margin-left:6px; }
    
    .actions-right button { opacity:0; transition:opacity .2s; }
    .msg:hover .actions-right button, .msg-actions.show .actions-right button { opacity:1; }
    .msg-actions button { padding:3px 10px; border:none; border-radius:12px; background:var(--bg-tertiary); color:var(--text-secondary); font-size:11px; cursor:pointer; transition:all var(--tr); font-weight:500; }
    .msg-actions button:active { background:var(--accent-light); color:var(--accent); }

    /* EDIT MODAL */
    .edit-card { position:absolute; top:12vh; height:75vh; left:6px; right:6px; background:var(--bg-secondary); display:flex; flex-direction:column; border-radius:var(--radius-lg); box-shadow:0 10px 30px rgba(0,0,0,0.2); overflow:hidden; animation:msgIn .3s ease-out; }
    .edit-card-body { flex:1; display:flex; padding:12px; overflow:hidden; }
    .edit-card-body textarea { flex:1; width:100%; border:none; background:transparent; color:inherit; font-size:15px; font-family:inherit; line-height:1.7; resize:none; outline:none; overflow-y:auto; }
    .edit-card-foot { display:flex; gap:10px; padding:14px 16px; border-top:0.5px solid var(--border-subtle); background:var(--bg-secondary); }
    .edit-card-foot button { flex:1; padding:12px 0; border-radius:16px; font-size:14px; }
    .edit-save-btn { background:var(--accent); color:#fff; }
    .edit-save-btn:active { opacity:.85; transform:scale(.98); }
    .edit-cancel-btn { background:var(--bg-tertiary); color:var(--text-secondary); }
    .edit-cancel-btn:active { background:rgba(128,128,128,.12); }

    /* MARKDOWN */
    .bubble :is(h1,h2,h3) { margin:10px 0 4px; font-size:1.05em; }
    .bubble p { margin:4px 0; }
    .bubble p:first-child { margin-top:0; }
    .bubble p:last-child { margin-bottom:0; }
    .bubble ul, .bubble ol { padding-left:18px; margin:4px 0; }
    .bubble li { margin:2px 0; }
    .bubble code { background:var(--bg-tertiary); padding:2px 5px; border-radius:3px; font-family:var(--mono); font-size:.86em; }

    /* CODE BLOCK */
    .code-block-wrapper { border-radius:var(--radius-sm); overflow:hidden; margin:8px 0; background:var(--code-bg); }
    .code-block-header { padding:4px 8px; background:var(--code-header-bg); border-bottom:1px solid var(--border-subtle); }
    .code-lang { font-size:11px; color:#9ca3af; text-transform:uppercase; font-weight:500; }
    .code-btns { gap:4px; }
    .code-btn { padding:2px 8px; border:none; border-radius:4px; background:rgba(128,128,128,.15); color:var(--text-secondary); font-size:10px; cursor:pointer; transition:background var(--tr); }
    .code-btn:hover { background:rgba(128,128,128,.25); }
    .code-block-wrapper.collapsed pre { max-height:100px; overflow-y:hidden; overflow-x:auto; position:relative; }
    .bubble .code-block-wrapper pre, .bubble .code-block-wrapper pre code { background:var(--code-bg) !important; color:inherit; }
    .bubble .code-block-wrapper pre { padding:12px; overflow-x:auto; margin:0; scrollbar-width:none; }
    .bubble .code-block-wrapper pre::-webkit-scrollbar { display:none; }
    .bubble blockquote { border-left:2px solid var(--accent); padding-left:12px; margin:6px 0; color:var(--text-secondary); opacity:.85; }
    .bubble table { border-collapse:collapse; width:100%; margin:6px 0; font-size:12px; }
    .bubble th, .bubble td { border:1px solid var(--border-subtle); padding:5px 8px; text-align:left; }
    .bubble th { background:var(--bg-tertiary); }
    .bubble a { color:var(--accent); }
    .bubble img { max-width:100%; border-radius:var(--radius-sm); }

    /* INPUT */
    #input-bar { align-items:flex-end; padding:6px 10px 2px; background:var(--bg-secondary); border-top:0.5px solid var(--border-soft); z-index:100; flex-shrink:0; }
    .inp-wrap { flex:1; display:flex; align-items:flex-end; background:var(--bg-tertiary); border-radius:24px; padding:3px 6px 3px 14px; border:1.5px solid transparent; transition:all var(--tr); }
    .inp-wrap:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
    #input-bar textarea { flex:1; border:none; background:transparent; color:inherit; font-size:14.5px; line-height:1.4; resize:none; outline:none; padding:7px 0; max-height:220px; font-family:inherit; }
    #input-bar textarea::placeholder { color:var(--text-secondary); opacity:.5; }

    /* BOTTOM BAR */
    #bottom-bar { gap:6px; padding:2px 10px 3px; padding-bottom:calc(3px + var(--safe-b)); background:var(--bg-secondary); flex-shrink:0; position:relative; }
    #model-chip-btn, #reasoning-btn { gap:5px; padding:5px 10px; border-radius:14px; border:1.5px solid var(--border-subtle); background:var(--bg-tertiary); color:inherit; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all var(--tr); flex-shrink:0; }
    #model-chip-btn:active, #reasoning-btn:active { transform:scale(.95); border-color:var(--accent); }
    #model-chip-btn .micon { font-size:16px; }
    #send-btn, #stop-btn { width:36px; height:36px; font-size:18px; }
    #send-btn { background:var(--accent); color:#fff; }

    /* DROPDOWN */
    .dropdown-menu { position:fixed; background:var(--bg-secondary); border:1px solid var(--border-subtle); border-radius:var(--radius-md); box-shadow:0 4px 14px rgba(0,0,0,.15); z-index:500; min-width:140px; padding:4px; display:none; max-height:40vh; overflow-y:auto; }
    .dropdown-menu.show { display:block; }
    .dropdown-menu .dropdown-item { padding:8px 12px; font-size:13px; cursor:pointer; border-radius:var(--radius-sm); gap:8px; color:inherit; transition:background .15s; }
    .dropdown-menu .dropdown-item:hover, .dropdown-menu .dropdown-item.selected { background:var(--bg-tertiary); }
    .dropdown-menu .dropdown-item .check { margin-left:auto; color:var(--accent); font-weight:700; }
    .dropdown-menu .dropdown-header { padding:8px 12px 4px; font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; pointer-events:none; }
    .dropdown-menu .dropdown-header:not(:first-child) { border-top:1px solid var(--border-soft); margin-top:4px; }

    /* DRAWER & SHEET */
    .drawer { position:fixed; top:0; bottom:0; width:320px; max-width:86vw; background:var(--bg-secondary); z-index:300; display:flex; flex-direction:column; transition:transform .3s cubic-bezier(.4,0,.2,1); box-shadow:0 0 40px rgba(0,0,0,.15); }
    .drawer-right { right:0; transform:translateX(100%); border-radius:var(--radius-lg) 0 0 var(--radius-lg); }
    .drawer-right.open { transform:translateX(0); }
    .drawer-head { padding:14px 16px; border-bottom:0.5px solid rgba(128,128,128,.1); }
    .drawer-head h3 { font-size:15px; font-weight:700; }
    .drawer-body { flex:1; overflow-y:auto; padding:14px; }
    .sheet { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(100%); width:100%; max-width:700px; max-height:70vh; background:var(--bg-secondary); z-index:350; border-radius:var(--radius-lg) var(--radius-lg) 0 0; display:flex; flex-direction:column; transition:transform .3s cubic-bezier(.4,0,.2,1); box-shadow:0 -4px 20px rgba(0,0,0,.2); }
    .sheet.open { transform:translateX(-50%) translateY(0); }
    .sheet-handle { width:32px; height:4px; border-radius:2px; background:rgba(128,128,128,.2); margin:10px auto 6px; flex-shrink:0; }
    .sheet-title { font-size:14px; font-weight:700; text-align:center; padding:4px 0 10px; flex-shrink:0; }
    .sheet-body { flex:1; overflow-y:auto; padding:0 16px 30px; }

    /* ASSISTANT CARDS */
    .ast-grid { display:flex; flex-direction:column; gap:10px; padding:8px 0; }
    .ast-card { padding:14px 16px; background:var(--bg-secondary); border-radius:var(--radius-md); cursor:pointer; transition:all var(--tr); gap:12px; border:1.5px solid transparent; }
    .ast-card:active { border-color:var(--accent); }
    .ast-card .ast-icon { font-size:32px; flex-shrink:0; }
    .ast-card .ast-info { flex:1; min-width:0; }
    .ast-card .ast-name { font-size:15px; font-weight:700; margin-bottom:2px; }
    .ast-card .ast-meta { font-size:11px; color:var(--text-secondary); gap:8px; }
    .ast-card .ast-prompt { font-size:11px; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:3px; }
    .ast-card:hover .ast-del { opacity:1; }

    /* TOPIC LIST */
    .topic-item { gap:8px; padding:10px 12px; border-radius:var(--radius-md); cursor:pointer; transition:all var(--tr); margin-bottom:3px; border:1.5px solid transparent; }
    .topic-item:hover, .topic-item.active { background:var(--bg-tertiary); }
    .topic-item.active { border-color:var(--accent-light); }
    .topic-item .tinfo { flex:1; min-width:0; }
    .ttitle-wrap { margin-bottom:2px; }
    .topic-item .ttitle { font-size:13px; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .topic-item .tmeta { font-size:10px; color:var(--text-secondary); }
    .topic-item .tact { gap:16px; } 
    .topic-btn { width:32px; height:32px; font-size:14px; } 
    
    .topic-rename-input { padding:5px 8px; flex:1; min-width:0; font-weight:600; }
    .new-topic-btn { width:100%; padding:10px; border:2px dashed rgba(128,128,128,.2); border-radius:var(--radius-md); background:transparent; color:var(--accent); font-size:13px; font-weight:600; cursor:pointer; margin-bottom:10px; transition:all var(--tr); }
    .new-topic-btn:active { background:var(--accent-light); }

    /* SETTINGS */
    .section { margin-bottom:22px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; }
    .field textarea { resize:vertical; min-height:50px; }
    .field .hint { font-size:10px; color:var(--text-secondary); margin-top:3px; }
    .field .hint a { color:var(--accent); }

    .settings-fold { margin-bottom:14px; border-radius:var(--radius-sm); overflow:hidden; background:var(--bg-tertiary); }
    .settings-fold-head { padding:9px 12px; background:var(--bg-tertiary); border:none; width:100%; font-size:12px; font-weight:600; color:var(--text-secondary); cursor:pointer; }
    .settings-fold-head .arr { transition:transform var(--tr); font-size:9px; }
    .settings-fold.open .settings-fold-head .arr { transform:rotate(90deg); }
    .settings-fold-body { padding:8px 12px 12px; background:var(--bg-tertiary); border-top:1px solid var(--border-soft); display:none; }
    .settings-fold.open .settings-fold-body { display:block; }
    .icon-btn { border-radius:8px; border:1px solid var(--border-subtle); background:var(--bg-tertiary); color:var(--text-secondary); font-size:16px; }

    .prompt-toolbar { gap:3px; margin-bottom:8px; flex-wrap:wrap; }
    .prompt-toolbar button { width:30px; height:28px; border-radius:6px; border:1px solid var(--border-subtle); background:var(--bg-tertiary); color:var(--text-secondary); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; transition:all var(--tr); font-family:var(--mono); }
    .prompt-toolbar button:active { background:var(--accent-light); color:var(--accent); }

    .fs-prompt-head { padding:12px 14px; border-bottom:0.5px solid rgba(128,128,128,.1); flex-shrink:0; }
    .fs-prompt-body { flex:1; display:flex; flex-direction:column; padding:14px; overflow:hidden; }
    .fs-prompt-body textarea { flex:1; width:100%; padding:14px; border:2px solid var(--accent); border-radius:var(--radius-md); background:var(--bg-tertiary); color:inherit; font-size:15px; font-family:inherit; line-height:1.7; resize:none; outline:none; }

    .slider-row { gap:10px; }
    .slider-row input[type="range"] { flex:1; height:4px; border-radius:2px; background:var(--border-subtle); outline:none; padding:0; border:none; }
    .slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--accent); cursor:pointer; border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.2); }

    .t-row { padding:9px 12px; background:var(--bg-tertiary); border-radius:var(--radius-sm); }
    .t-row span { font-size:13px; font-weight:500; }
    .tsw { position:relative; width:42px; height:24px; background:rgba(128,128,128,.2); border-radius:12px; cursor:pointer; transition:background var(--tr); flex-shrink:0; }
    .tsw.active { background:var(--accent); }
    .tsw::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:transform var(--tr); box-shadow:0 1px 2px rgba(0,0,0,.2); }
    .tsw.active::after { transform:translateX(18px); }

    .confirm-card { background:var(--bg-secondary); border-radius:18px; padding:20px 24px; max-width:300px; width:80%; box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center; animation:msgIn .2s ease-out; }
    .confirm-msg { font-size:15px; font-weight:600; margin-bottom:18px; line-height:1.5; }
    .confirm-actions { display:flex; gap:10px; justify-content:center; }
    .confirm-actions button { flex:1; padding:10px 0; border-radius:14px; font-size:14px; }
    .confirm-cancel { background:var(--bg-tertiary); color:var(--text-secondary); }
    .confirm-cancel:active { background:rgba(128,128,128,.12); }
    .confirm-ok { background:var(--danger); color:#fff; }
    .confirm-ok:active { opacity:.85; transform:scale(.97); }

    .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a1a2e; color:#fff; padding:9px 18px; border-radius:18px; font-size:12px; z-index:500; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; box-shadow:0 4px 12px rgba(0,0,0,.3); }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .scroll-down { position:fixed; bottom:140px; right:16px; width:34px; height:34px; border:1px solid var(--border-subtle); background:var(--bg-secondary); font-size:14px; z-index:50; box-shadow:0 2px 8px rgba(0,0,0,.08); display:none; }
    .scroll-down.show { display:flex; }
    .btn-primary { padding:10px 20px; border-radius:18px; background:var(--accent); color:#fff; font-size:13px; width:100%; }
    .btn-primary:active { transform:scale(.97); opacity:.85; }
    .empty { text-align:center; padding:36px 20px; color:var(--text-secondary); font-size:13px; }
    .page, .chat-page { display:none; flex-direction:column; height:100%; }
    .page.active, .chat-page.active { display:flex; }
    .data-actions { gap:6px; }
    .data-actions button { flex:1; padding:8px 8px; border-radius:12px; border:1.5px solid var(--border-subtle); background:var(--bg-tertiary); font-size:11px; }
    .data-actions button:active { border-color:var(--accent); }
  </style>
</head>
<body>
<div id="app">
  <!-- ASSISTANTS PAGE -->
  <div class="page active" id="ast-page">
    <div class="navbar">
      <div style="width:34px"></div>
      <div class="nav-center"><span class="asst-name">AI Chat</span></div>
      <button class="nav-btn accent" id="add-ast-btn">＋</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:10px 12px;">
      <div class="ast-grid" id="ast-list"></div>
    </div>
  </div>

  <!-- CHAT PAGE -->
  <div class="chat-page" id="chat-page">
    <div class="navbar">
      <div class="nav-left"><button class="nav-btn" id="chat-back">←</button></div>
      <div class="nav-center" id="chat-title-area">
        <span class="asst-name" id="chat-asst-name">助手</span>
        <div class="topic-row" id="topic-toggle">
          <span class="topic-name" id="chat-topic-name">新话题</span>
          <span class="nav-tokens" id="chat-nav-tokens">0k</span>
          <span class="topic-arr">▾</span>
        </div>
      </div>
      <div class="nav-right"><button class="nav-btn" id="settings-btn">⚙️</button></div>
    </div>
    <div id="chat-container"><div id="messages"></div></div>
    <button class="scroll-down" id="scroll-down">↓</button>
    <div id="input-bar">
      <div class="inp-wrap"><textarea id="user-input" rows="1" placeholder="输入消息，Enter 换行..." autofocus></textarea></div>
    </div>
    <div id="bottom-bar">
      <button id="model-chip-btn"><span class="micon">🧠</span><span id="model-chip-label">模型</span> ▾</button>
      <button id="reasoning-btn"><span id="reasoning-label">推理：关闭</span> ▾</button>
      <button id="send-btn">➤</button>
      <button id="stop-btn" style="display:none">■</button>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="edit-overlay" id="edit-overlay">
    <div class="edit-card">
      <div class="edit-card-body"><textarea id="edit-textarea" placeholder="输入消息内容…"></textarea></div>
      <div class="edit-card-foot">
        <button class="edit-cancel-btn" id="edit-cancel-btn">取消</button>
        <button class="edit-save-btn" id="edit-save-btn">保存</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-card">
      <div class="confirm-msg" id="confirm-msg">确定要执行此操作吗？</div>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="confirm-cancel">取消</button>
        <button class="confirm-ok" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>

  <!-- TOPICS DRAWER -->
  <div class="drawer drawer-right" id="topics-drawer">
    <div class="drawer-head">
      <h3 style="display:flex;align-items:center">📋 历史话题 <span class="nav-tokens" id="drawer-total-tokens">0k</span></h3>
      <button class="nav-btn" id="close-topics">✕</button>
    </div>
    <div class="drawer-body">
      <button class="new-topic-btn" id="new-topic">＋ 新建话题</button>
      <div id="topic-list"></div>
    </div>
  </div>

  <!-- SETTINGS DRAWER -->
  <div class="drawer drawer-right" id="settings-drawer">
    <div class="drawer-head"><h3>⚙️ 设置</h3><button class="nav-btn" id="close-settings">✕</button></div>
    <div class="drawer-body" id="settings-body"></div>
  </div>

  <!-- ADD ASSISTANT SHEET -->
  <div class="sheet" id="add-ast-sheet">
    <div class="sheet-handle"></div><div class="sheet-title">添加助手</div>
    <div class="sheet-body">
      <div class="field"><label>助手名称</label><input type="text" id="new-ast-name" placeholder="如 编程助手"></div>
      <div class="field"><label>系统提示词</label><textarea id="new-ast-prompt" rows="3">你是一个有帮助的AI助手，请用简洁清晰的语言回答。</textarea></div>
      <button class="btn-primary" id="create-ast" style="margin-top:8px">✨ 创建助手</button>
    </div>
  </div>

  <!-- FULLSCREEN PROMPT EDITOR -->
  <div class="fs-prompt-overlay" id="fs-prompt-overlay">
    <div class="fs-prompt-head">
      <span style="font-size:14px;font-weight:700">✏️ 编辑系统提示词</span>
      <button class="nav-btn" id="fs-prompt-close">✕</button>
    </div>
    <div class="fs-prompt-body">
      <div class="prompt-toolbar" id="fs-prompt-tb">
        <button data-md="bold" title="粗体">B</button>
        <button data-md="italic" title="斜体"><i>I</i></button>
        <button data-md="code" title="代码">&lt;/&gt;</button>
        <button data-md="heading" title="标题">H</button>
        <button data-md="list" title="列表">•</button>
        <button data-md="quote" title="引用">❝</button>
        <button id="fs-prompt-save" title="保存并应用" style="margin-left:auto; background:var(--accent); color:#fff; border-color:var(--accent);">💾</button>
      </div>
      <textarea id="fs-prompt-textarea" placeholder="输入系统提示词…"></textarea>
    </div>
  </div>

  <!-- COMMON WIDGETS -->
  <div class="dropdown-menu" id="dropdown-menu"></div>
  <div class="toast" id="toast"></div>
  <input type="file" id="import-file" accept=".json" style="display:none;">
</div>

<script>
(() => {
'use strict';

// ==================== UTILS ====================
const $1 = s => document.getElementById(s);
const on = (id, evt, cb) => { const el = typeof id === 'string' ? $1(id) : id; if(el) el.addEventListener(evt, cb); };
const off = (id, evt, cb) => { const el = typeof id === 'string' ? $1(id) : id; if(el) el.removeEventListener(evt, cb); };
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const esc = t => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

// ==================== TOKENS CALCULATION ====================
const estimateTokens = str => {
  if (!str) return 0;
  const zhCnt = (str.match(/[\u4e00-\u9fa5]/g) ||[]).length;
  return Math.ceil(zhCnt + (str.length - zhCnt) * 0.25);
};
const getMsgTokens = m => estimateTokens(m.content) + estimateTokens(m.reasoning);
const calcConvTokens = (c, p) => c.messages.reduce((t, m) => t + getMsgTokens(m), estimateTokens(p));
const formatK = t => t < 1000 ? t : (t/1000).toFixed(1) + 'k';

// ==================== STATE & MODELS ====================
const STORAGE_KEY = 'ai_chat_v8';
let state = loadState();
let abortCtrl = null, streaming = false;
let editingMsg = null, editingIdx = -1, editingConv = null;
const generationTimers = {};

const DS_MODELS =[
  { id: 'deepseek-v4-pro',   name: 'DeepSeek V4 Pro',   icon: '💎' },
  { id: 'deepseek-v4-flash', name: 'DeepSeek V4 Flash', icon: '⚡' }
];

const getModelInfo = id => DS_MODELS.find(m => m.id === id) || { icon: '✨', name: id, custom: true };
const isDeepSeek = id => DS_MODELS.some(m => m.id === id) || (id || '').toLowerCase().includes('deepseek');
const getCustomModels = () => (state.geminiModels || '').split(',').map(s => s.trim()).filter(Boolean);

function loadState() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) {
      const p = JSON.parse(r);
      return {
        assistants: (p.assistants ||[]).map(fixAsst),
        activeAstId: p.activeAstId || null,
        deepseekKey: p.deepseekKey || '',
        geminiKey: p.geminiKey || '',
        geminiBaseUrl: p.geminiBaseUrl || 'https://generativelanguage.googleapis.com',
        geminiModels: p.geminiModels || 'gemini-2.5-pro, gemini-2.0-flash-thinking-exp',
        darkMode: !!p.darkMode
      };
    }
  } catch(e){}
  return { 
    assistants:[], activeAstId:null, deepseekKey:'', geminiKey:'', 
    geminiBaseUrl:'https://generativelanguage.googleapis.com', 
    geminiModels: 'gemini-2.5-pro, gemini-2.0-flash-thinking-exp', darkMode:false 
  };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) { toast('⚠️ 存储空间不足'); }
}

function fixAsst(a) {
  let modelId = a.modelId || 'deepseek-v4-pro';
  if (a.provider === 'gemini' && a.geminiModel) { modelId = a.geminiModel; delete a.provider; delete a.geminiModel; }
  return {
    id: a.id || genId(), name: a.name || '未命名助手', systemPrompt: a.systemPrompt || '你是一个有帮助的AI助手。',
    temperature: a.temperature ?? 1.0, topP: a.topP ?? 1.0, modelId, reasoningEffort: a.reasoningEffort || 'off',
    conversations: (a.conversations ||[]).map(c => ({ 
      id: c.id || genId(), title: c.title || '新话题', 
      messages: (c.messages ||[]).map(m => {
        // 兼容旧数据的计时字段，统一转化为全局耗时
        if (m.reasoningTime && !m.genTime) { m.genTime = m.reasoningTime; delete m.reasoningTime; }
        return m;
      })
    })),
    activeConvId: a.activeConvId || null
  };
}

const getActiveAst = () => state.assistants.find(a => a.id === state.activeAstId) || null;
const getActiveConv = (a = getActiveAst()) => a ? a.conversations.find(c => c.id === a.activeConvId) : null;
function ensureConv(a) {
  let c = getActiveConv(a);
  if (!c) {
    c = { id: genId(), title: '新话题', messages:[] };
    a.conversations.unshift(c); a.activeConvId = c.id; saveState();
  }
  return c;
}

function toast(m, d = 2000) {
  const t = $1('toast'); t.textContent = m; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), d);
}

// ==================== COPY & CONFIRM ====================
async function copyText(text) {
  try { if (navigator.clipboard?.writeText) return await navigator.clipboard.writeText(text); } catch(e) {}
  const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function showConfirm(msg) {
  return new Promise(resolve => {
    $1('confirm-msg').textContent = msg; $1('confirm-overlay').classList.add('show');
    const cleanup = () => { $1('confirm-overlay').classList.remove('show'); off('confirm-ok', 'click', onOk); off('confirm-cancel', 'click', onCancel); };
    const onOk = () => { cleanup(); resolve(true); }; const onCancel = () => { cleanup(); resolve(false); };
    on('confirm-ok', 'click', onOk); on('confirm-cancel', 'click', onCancel);
  });
}

// ==================== PWA & THEME ====================
function setupPWA() {
  const manifest = {
    name: 'AI Chat', short_name: 'AI Chat', description: 'DeepSeek & Gemini AI 聊天助手',
    start_url: location.href.split('?')[0], display: 'standalone', orientation: 'portrait',
    background_color: '#f0f0f5', theme_color: '#4f46e5',
    icons:[{ src: `data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect fill="#4f46e5" width="192" height="192" rx="36"/><text x="96" y="124" text-anchor="middle" font-size="96">🤖</text></svg>')}`, sizes:'192x192', type:'image/svg+xml', purpose:'any maskable' }]
  };
  $1('pwa-manifest').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type:'application/json' }));
}

function applyTheme() {
  const d = state.darkMode;
  document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
  $1('hljs-theme').href = `https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github${d ? '-dark' : ''}.min.css`;
}

// ==================== NAVIGATION ====================
function goToAsts() { $1('ast-page').classList.add('active'); $1('chat-page').classList.remove('active'); renderAstList(); }
function goToChat(id) { state.activeAstId = id; saveState(); $1('ast-page').classList.remove('active'); $1('chat-page').classList.add('active'); renderChatPage(); closeAll(); }

// ==================== ASSISTANT LIST ====================
function renderAstList() {
  const l = $1('ast-list');
  if (!state.assistants.length) return l.innerHTML = '<div class="empty">还没有助手，点击 ＋ 创建</div>';
  l.innerHTML = state.assistants.map(a => {
    const m = getModelInfo(a.modelId);
    return `<div class="ast-card" data-id="${a.id}">
      <span class="ast-icon">${m.icon}</span>
      <div class="ast-info">
        <div class="ast-name">${esc(a.name)}</div>
        <div class="ast-meta"><span>${m.icon} ${esc(m.name)}</span><span>${a.conversations.length} 个话题</span></div>
        <div class="ast-prompt">${esc(a.systemPrompt).substring(0,40)}</div>
      </div>
      <button class="ast-del">🗑</button>
    </div>`;
  }).join('');
}

on('ast-list', 'click', async e => {
  const card = e.target.closest('.ast-card'); if (!card) return;
  const id = card.dataset.id;
  
  if (e.target.closest('.ast-del')) {
    e.stopPropagation(); if (!await showConfirm('确定要删除此助手吗？')) return;
    state.assistants = state.assistants.filter(a => a.id !== id);
    if (state.activeAstId === id) state.activeAstId = null;
    saveState(); renderAstList(); return;
  }
  goToChat(id);
});

on('add-ast-btn', 'click', () => openSheet('add-ast-sheet'));
on('create-ast', 'click', () => {
  const n = $1('new-ast-name').value.trim(); if (!n) return toast('请输入名称');
  state.assistants.unshift({
    id: genId(), name: n, systemPrompt: $1('new-ast-prompt').value.trim(),
    temperature: 1.0, topP: 1.0, modelId: 'deepseek-v4-pro', reasoningEffort: 'off',
    conversations:[], activeConvId: null
  });
  saveState(); closeAll(); renderAstList(); $1('new-ast-name').value = ''; toast('✅ 已创建');
});

// ==================== CHAT PAGE ====================
function renderChatPage() {
  const a = getActiveAst(); if (!a) return goToAsts();
  const c = getActiveConv(a);
  const m = getModelInfo(a.modelId);
  
  $1('chat-asst-name').textContent = `${a.name}${a.conversations.length ? ` (${a.conversations.length})` : ''}`;
  $1('chat-topic-name').textContent = c ? c.title : '新话题';
  $1('chat-nav-tokens').textContent = formatK(c ? calcConvTokens(c, a.systemPrompt) : estimateTokens(a.systemPrompt));
  $1('model-chip-label').textContent = m.name;
  $1('model-chip-btn').querySelector('.micon').textContent = m.icon;

  const R_LABELS = { off: '关闭', low: 'Low', high: 'High', max: 'Max' };
  $1('reasoning-label').textContent = `推理：${R_LABELS[a.reasoningEffort] || a.reasoningEffort}`;
  
  renderMessages();
}

// ==================== MESSAGES & MARKDOWN ====================
marked.setOptions({ breaks: true, gfm: true });
const md = t => { if (!t) return ''; try { return marked.parse(t); } catch(e) { return esc(t).replace(/\n/g, '<br>'); } };

function enhanceCodeBlocks(container) {
  container.querySelectorAll('pre:not(.code-block-wrapper pre)').forEach(pre => {
    const code = pre.querySelector('code');
    const lang = code?.className.match(/language-([a-zA-Z0-9_\-]+)/)?.[1] || 'text';

    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper collapsed';
    wrapper.innerHTML = `<div class="code-block-header"><span class="code-lang">${lang}</span><div class="code-btns"><button class="code-btn copy-btn">复制</button><button class="code-btn fold-btn">展开</button></div></div>`;
    
    pre.parentNode.insertBefore(wrapper, pre); wrapper.appendChild(pre);

    on(wrapper.querySelector('.copy-btn'), 'click', e => {
      e.stopPropagation(); copyText((code || pre).textContent || '').then(() => { e.target.textContent = '✓'; setTimeout(() => e.target.textContent = '复制', 1200); });
    });
    on(wrapper.querySelector('.fold-btn'), 'click', e => {
      e.stopPropagation(); const isCol = wrapper.classList.toggle('collapsed'); e.target.textContent = isCol ? '展开' : '折叠';
    });
    if (code && !code.dataset.hl) { try { hljs.highlightElement(code); code.dataset.hl = '1'; } catch(e) {} }
  });
}

function makeMsg(msg, idx) {
  const isAi = msg.role === 'assistant';
  const d = document.createElement('div'); 
  d.className = `msg ${isAi ? 'ai' : 'user'}`; 
  d.dataset.index = idx;

  const thinkTimeHTML = msg.thinkTime ? `<span class="think-time" style="opacity:0.7;font-size:10px;font-weight:normal;margin-left:4px;">(${msg.thinkTime}s)</span>` : '';
  const rHTML = msg.reasoning ? `<div class="rblock"><button class="rhead"><span>🧠 思考过程${thinkTimeHTML}</span><span class="arr">▶</span></button><div class="rbody">${esc(msg.reasoning)}</div></div>` : '';
  const mInfo = getModelInfo(msg.modelId || getActiveAst()?.modelId);
  const badgeHtml = mInfo.custom ? `✨ ${esc(mInfo.name)}` : `${mInfo.icon} ${mInfo.name}`;
  const buttonsHtml = `<button data-a="cp" title="复制">📋</button><button data-a="ed" title="编辑">✏️</button><button data-a="del" title="删除">🗑</button><button data-a="re" title="${isAi?'重新生成':'重新发送'}">${isAi?'🔄':'↩️'}</button>`;
  
  const tokenDisplay = isAi ? '🏷️ ' + formatK(getMsgTokens(msg)) : '';
  const timeDisplay = isAi ? `<span class="gen-time">⏱ ${msg.genTime || (msg.startTime ? ((Date.now()-msg.startTime)/1000).toFixed(0) : '0')}s</span>` : '';

  d.innerHTML = `<div class="bubble">${rHTML}<div class="markdown-body">${md(msg.content)}</div></div>
    <div class="msg-actions">
      <div class="actions-left">${isAi ? `<span class="badge">${badgeHtml}</span>${timeDisplay}` : ''}</div>
      <div class="msg-tokens">${tokenDisplay}</div>
      <div class="actions-right">${buttonsHtml}</div>
    </div>`;
  enhanceCodeBlocks(d); 
  return d;
}

on('messages', 'click', async e => {
  const hint = e.target.closest('.welcome-hint');
  if (hint) { $1('user-input').value = hint.dataset.prompt; return sendMessage(); }

  const rhead = e.target.closest('.rhead');
  if (rhead) { rhead.classList.toggle('open'); rhead.nextElementSibling.classList.toggle('open'); return; }

  const btn = e.target.closest('button[data-a]');
  if (btn) {
    e.stopPropagation();
    const act = btn.dataset.a;
    const idx = parseInt(btn.closest('.msg').dataset.index, 10);
    const conv = getActiveConv(); const msg = conv.messages[idx];
    
    if (act === 'cp') return copyText(msg.content).then(() => toast('已复制'));
    if (streaming) return toast('⚠️ 生成中不可操作');

    if (act === 'ed') openEditModal(msg, idx, conv);
    else if (act === 'del') deleteMessage(idx);
    else if (act === 're') msg.role === 'assistant' ? regenerateMessage(idx) : resendUserMessage(idx);
  }
});

function updateLive(idx, msg) {
  const bub = document.querySelector(`#messages .msg.ai[data-index="${idx}"] .bubble`); if (!bub) return;
  const isThinking = msg.content.length === 0; // 当普通内容为空时，即正在思考阶段
  
  if (msg.reasoning) { 
          let rb = bub.querySelector('.rblock');
          if (!rb) { 
              // 初始输出思考块时，默认添加 open 类实现展开
              bub.insertAdjacentHTML('afterbegin', '<div class="rblock"><button class="rhead open"><span>🧠 思考过程<span class="think-time" style="opacity:0.7;font-size:10px;font-weight:normal;margin-left:4px;"></span></span><span class="arr">▶</span></button><div class="rbody open"></div></div>'); 
              rb = bub.querySelector('.rblock');
          }
          
          const ttEl = rb.querySelector('.think-time');
          // 思考中，实时更新思考时间
          if (isThinking && msg.startTime) {
              ttEl.textContent = `(${((Date.now() - msg.startTime) / 1000).toFixed(0)}s)`;
          }

          // 思考结束后自动收起并固定思考时间
          if (!isThinking && !rb.dataset.autoClosed) {
              rb.querySelector('.rhead').classList.remove('open');
              rb.querySelector('.rbody').classList.remove('open');
              rb.dataset.autoClosed = '1';
              if (msg.startTime && !msg.thinkTime) {
                  msg.thinkTime = ((Date.now() - msg.startTime) / 1000).toFixed(0);
                  if (ttEl) ttEl.textContent = `(${msg.thinkTime}s)`;
              }
          }
          rb.querySelector('.rbody').textContent = msg.reasoning;
      }
  let mc = bub.querySelector('.markdown-body');
  if (!mc) { 
      bub.insertAdjacentHTML('beforeend', '<div class="markdown-body"></div>');
      mc = bub.querySelector('.markdown-body');
  }
  mc.innerHTML = md(msg.content); 
  enhanceCodeBlocks(bub);

  // 实时更新ai消息的token内容
  const tokensEl = document.querySelector(`#messages .msg[data-index="${idx}"] .msg-tokens`);
  if (tokensEl) tokensEl.textContent = '🏷️ ' + formatK(getMsgTokens(msg));
}

async function sendMessage() {
  if (streaming) return;
  const txt = $1('user-input').value.trim(); if (!txt) return;
  const a = getActiveAst(); if (!a) return;
  
  if (isDeepSeek(a.modelId)) {
      if (!state.deepseekKey) return toast('请先设置 DeepSeek API Key') || openSettings();
  } else {
      if (!state.geminiKey) return toast('请先设置 第三方 API Key') || openSettings();
  }
  
  $1('user-input').value = ''; $1('user-input').style.height = 'auto';
  const c = ensureConv(a); c.messages.push({ role: 'user', content: txt });
  if (c.title === '新话题') c.title = txt.substring(0, 28) + (txt.length > 28 ? '…' : '');
  saveState(); renderMessages(); scrollBottom(true);

  const am = { role: 'assistant', content: '', reasoning: '', genTime: null, thinkTime: null, modelId: a.modelId };
  c.messages.push(am); const ai = c.messages.length - 1;
  saveState(); renderMessages(); setStreamingUI(true); streaming = true;

  let currentTokens = calcConvTokens(c, a.systemPrompt);
  $1('chat-nav-tokens').textContent = formatK(currentTokens);

  let body = {}, url = '', headers = {};
  if (!isDeepSeek(a.modelId)) {
      url = `${(state.geminiBaseUrl || 'https://generativelanguage.googleapis.com').replace(/\/+$/, '')}/v1beta/models/${a.modelId}:streamGenerateContent?alt=sse`;
      headers = { 'Content-Type': 'application/json', 'x-goog-api-key': state.geminiKey };
      if (state.geminiKey.startsWith('sk-') || state.geminiKey.startsWith('Bearer ')) headers['Authorization'] = state.geminiKey.startsWith('Bearer ') ? state.geminiKey : `Bearer ${state.geminiKey}`;
      
      let contents =[];
      for (const m of c.messages.slice(0, -1)) {
          const role = m.role === 'user' ? 'user' : 'model';
          const parts = (m.thoughtSignatures ||[]).map(sig => ({ thoughtSignature: sig }));
          parts.push({ text: m.content || ' ' });
          if (contents.length > 0 && contents[contents.length - 1].role === role) contents[contents.length - 1].parts.push(...parts);
          else contents.push({ role, parts });
      }
      
      body = { contents, generationConfig: { temperature: a.temperature, topP: a.topP } };
      if (a.systemPrompt) body.systemInstruction = { role: "system", parts:[{ text: a.systemPrompt }] };
      if (a.reasoningEffort !== 'off') {
          const isV3 = a.modelId.includes('gemini-3');
          body.generationConfig.thinkingConfig = isV3 
              ? { includeThoughts: true, thinkingLevel: a.reasoningEffort === 'low' ? 'LOW' : 'HIGH' }
              : { includeThoughts: true, thinkingBudget: a.reasoningEffort === 'low' ? 1024 : 8192 };
      }
  } else {
      url = 'https://api.deepseek.com/chat/completions';
      headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.deepseekKey}` };
      body = { model: a.modelId, stream: true, messages:[{ role: 'system', content: a.systemPrompt }, ...c.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }))] };
      if (a.reasoningEffort === 'off') Object.assign(body, { temperature: a.temperature, top_p: a.topP, thinking: { type: 'disabled' } });
      else Object.assign(body, { reasoning_effort: a.reasoningEffort, thinking: { type: 'enabled' } });
  }

  abortCtrl = new AbortController();
  try {
    startGenTimer(ai, am); // 开始记录整体生成响应与输出耗时
    const resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body), signal: abortCtrl.signal });
    if (!resp.ok) { let em = `HTTP ${resp.status}`; try { em = (await resp.json()).error?.message || em; } catch(e){} throw new Error(em); }
    
    const reader = resp.body.getReader(), dec = new TextDecoder(); let buf = '';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream: true }); const lines = buf.split('\n'); buf = lines.pop() || '';
      for (let t of lines) {
        t = t.trim(); if (!t || !t.startsWith('data: ')) continue;
        const dataStr = t.slice(6); if (dataStr === '[DONE]') continue;
        try {
          const chunk = JSON.parse(dataStr);
          if (!isDeepSeek(a.modelId)) {
              for (const part of (chunk.candidates?.[0]?.content?.parts ||[])) {
                  if (part.thoughtSignature || part.thought_signature) {
                      am.thoughtSignatures ??=[];
                      am.thoughtSignatures.push(part.thoughtSignature || part.thought_signature);
                  }
                  if (part.thought === true || String(part.thought) === "true") {
                      currentTokens += estimateTokens(part.text || ''); 
                      am.reasoning += (part.text || '');
                  } else if (part.text) {
                      currentTokens += estimateTokens(part.text); 
                      am.content += part.text;
                  }
              }
          } else {
              const delta = chunk.choices?.[0]?.delta; if (!delta) continue;
              if (delta.reasoning_content) { 
                  currentTokens += estimateTokens(delta.reasoning_content); 
                  am.reasoning += delta.reasoning_content; 
              }
              if (delta.content) { 
                  currentTokens += estimateTokens(delta.content); 
                  am.content += delta.content; 
              }
          }
          $1('chat-nav-tokens').textContent = formatK(currentTokens); 
          updateLive(ai, am);
        } catch(e) {}
      }
    }
  } catch (err) { if (err.name !== 'AbortError') am.content = am.content || `❌ 错误：${err.message}`; }
  finally {
    streaming = false; abortCtrl = null; setStreamingUI(false);
    if (generationTimers[ai]) { clearInterval(generationTimers[ai]); delete generationTimers[ai]; }
    am.genTime = am.startTime ? ((Date.now() - am.startTime) / 1000).toFixed(0) : null;
    if (am.startTime && am.content.length === 0 && !am.thinkTime) am.thinkTime = am.genTime; // 若在纯思考阶段被中止，保留时间
    delete am.startTime; 
    saveState(); renderChatPage();
  }
}

// ==================== BINDINGS ====================
const openSheet = id => { closeDrawers(); $1('overlay').classList.add('show'); $1(id).classList.add('open'); };
const openDrawer = id => { $1('overlay').classList.add('show'); $1(id).classList.add('open'); };
const closeDrawers = () =>['topics-drawer','settings-drawer','add-ast-sheet'].forEach(id => $1(id).classList.remove('open'));
const closeAll = () => { hideDropdown(); $1('overlay').classList.remove('show'); closeDrawers(); };
const openSettings = () => { renderSettings(); openDrawer('settings-drawer'); };

on('send-btn', 'click', sendMessage);
on('stop-btn', 'click', () => abortCtrl?.abort());
on('user-input', 'keydown', function(e) { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendMessage(); } });
on('user-input', 'input', function() { this.style.height = 'auto'; this.style.height = `${Math.min(this.scrollHeight, 220)}px`; });
on('chat-container', 'scroll', function() { $1('scroll-down').classList.toggle('show', this.scrollHeight - this.scrollTop - this.clientHeight > 200 && $1('messages').children.length > 1); });
on('scroll-down', 'click', () => scrollBottom(true));
on('chat-back', 'click', goToAsts);
on('topic-toggle', 'click', e => { e.stopPropagation(); renderTopicList(); openDrawer('topics-drawer'); });
on('settings-btn', 'click', openSettings);
on('close-topics', 'click', closeAll);
on('close-settings', 'click', closeAll);
on('overlay', 'click', closeAll);

setupPWA(); applyTheme(); renderAstList();
state.activeAstId = null; saveState();
})();
</script>
