<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI Chat</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Chat">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f0f0f5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  
  <script>
    const svg="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><linearGradient id='g' x2='1' y2='1'><stop stop-color='#7F5AF0'/><stop offset='1' stop-color='#2CB67D'/></linearGradient><rect width='100' height='100' rx='22' fill='url(#g)'/><g transform='matrix(2 0 0 2 26 26)' stroke='#fff' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'><rect width='16' height='12' x='4' y='8' rx='2'/><path d='M12 8V4H8M2 14h2m16 0h2m-7-1v2M9 13v2'/></g></svg>";
    const url="data:image/svg+xml,"+encodeURIComponent(svg);
    const m=`{"name":"AI Chat","short_name":"AI Chat","start_url":"./","display":"standalone","background_color":"#0b0f19","theme_color":"#7F5AF0","icons":[{"src":"${url}","sizes":"192x192 512x512","type":"image/svg+xml","purpose":"any maskable"}]}`;
    document.head.insertAdjacentHTML("beforeend",`<link rel="manifest" href="data:application/manifest+json,${encodeURIComponent(m)}">\n  <link rel="icon" type="image/svg+xml" href="${url}">\n  <link rel="apple-touch-icon" href="${url}">`);
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css" id="hljs-theme">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js" defer></script>
  
  <link rel="stylesheet" href="https://unpkg.com/vditor@3.10.6/dist/index.css" />
  <script src="https://unpkg.com/vditor@3.10.6/dist/index.min.js" defer></script>

  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
<div id="app">
  
  <!-- 左侧抽屉：助手列表 -->
  <div class="drawer drawer-left" id="ast-drawer">
    <div class="drawer-head">
      <h3 class="flex-center" style="margin:0; font-size:16px; gap:8px;">
        <img src="https://api.iconify.design/lucide:bot.svg?color=%237F5AF0" style="width:1.2em; height:1.2em;"> 助手列表
      </h3>
      <div style="display: flex; gap: 8px;">
        <button class="nav-btn" id="add-ast-btn" title="新建助手"><i class="ph ph-plus"></i></button>
      </div>
    </div>
    <div class="drawer-body" style="padding: 10px 12px;">
      <div id="ast-list"></div>
    </div>
  </div>

  <!-- 中间主体：聊天页面 -->
  <div class="chat-page" id="chat-page">
    <div id="chat-page-mask"></div> <!-- 用于移动端开启侧栏后，捕获点击返回原位 -->
    <div class="navbar">
      <div class="nav-left">
        <button class="nav-btn" id="ast-drawer-btn" title="助手列表"><i class="ph ph-list"></i></button>
      </div>
      <div class="nav-center">
        <span class="asst-name" id="chat-asst-name">助手</span>
        <div class="topic-row" id="topic-toggle" title="历史话题">
          <span class="topic-name" id="chat-topic-name">新话题</span>
          <span class="nav-tokens" id="chat-nav-tokens">(0)</span>
          <span class="topic-arr ph ph-caret-down"></span>
        </div>
      </div>
      <div class="nav-right">
        <button class="nav-btn" id="settings-btn" title="设置"><i class="ph ph-gear"></i></button>
      </div>
    </div>
    <div id="chat-wrapper">
      <div id="density-map"></div>
      <div id="chat-container"><div id="messages"></div></div>
      <button class="scroll-down" id="scroll-down"><i class="ph ph-arrow-down"></i></button>
    </div>
    
    <div id="input-container">
      <div id="input-box">
        <textarea id="user-input" rows="1" placeholder="给助手发送消息，Enter 换行..." autofocus></textarea>
        <div id="bottom-bar">
          <div class="toolbar-left">
            <button id="model-chip-btn" title="切换模型"></button>
            <button id="reasoning-btn" title="推理深度"></button>
          </div>
          <div class="toolbar-right">
            <button id="send-btn"><i class="ph-fill ph-paper-plane-right"></i></button>
            <button id="stop-btn" class="hidden" title="停止生成"><div class="stop-square"></div></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 右侧抽屉：设置页面 -->
  <div class="drawer drawer-right" id="settings-drawer">
    <div class="drawer-head">
      <h3><i class="ph ph-gear"></i> 设置</h3>
      <button class="nav-btn" id="close-settings"><i class="ph ph-x"></i></button>
    </div>
    <div class="drawer-body" id="settings-body"></div>
  </div>

  <!-- 叠加弹窗容器 -->
  <div class="edit-overlay" id="edit-overlay">
    <div class="edit-card">
      <div class="edit-card-header">
        <span class="edit-title"><i class="ph ph-pencil-simple"></i> 编辑消息</span>
        <button id="edit-toggle-reasoning-btn" class="edit-toggle-btn"><i class="ph ph-brain"></i> 思考过程</button>
      </div>
      <div class="edit-card-body">
        <textarea id="edit-reasoning-textarea" placeholder="输入思考过程…"></textarea>
        <textarea id="edit-textarea" placeholder="输入消息内容…"></textarea>
      </div>
      <div class="modal-actions edit-card-foot">
        <button class="btn-cancel" id="edit-cancel-btn">取消</button>
        <button class="btn-ok" id="edit-save-btn">保存</button>
      </div>
    </div>
  </div>

  <div class="overlay-full" id="dialog-overlay">
    <div class="modal-card">
      <div class="modal-msg" id="dialog-msg"></div>
      <div class="field mb-16 hidden" id="dialog-input-wrap"><input id="dialog-input" class="text-center"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="dialog-cancel">取消</button>
        <button class="btn-ok" id="dialog-ok">确定</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="sheet-overlay" style="z-index: 340;"></div>

  <div class="topics-modal" id="topics-drawer">
    <div class="topics-modal-head">
      <h3 class="flex-center" style="margin:0; font-size:16px; gap:8px;">
        <i class="ph ph-list-dashes"></i> 历史话题 
        <span class="nav-tokens" id="drawer-total-tokens">0k</span>
      </h3>
      <button class="nav-btn" id="new-topic" title="新建话题"><i class="ph ph-plus"></i></button>
    </div>
    <div class="topics-modal-body">
      <div id="topic-list"></div>
    </div>
  </div>

  <div class="sheet" id="add-ast-sheet">
    <div class="sheet-handle"></div><div class="sheet-title">添加助手</div>
    <div class="sheet-body">
      <div class="field">
        <label>助手名称</label>
        <input id="new-ast-name" placeholder="如 编程助手">
      </div>
      <div class="field">
        <label>系统提示词</label>
        <textarea id="new-ast-prompt" rows="3">你是一个高通用性、严谨且富有协作精神的AI助手。你的核心目标不是扮演特定角色，而是动态适配用户的真实需求。</textarea>
      </div>
      <button class="btn-primary mt-8" id="create-ast"><i class="ph-fill ph-sparkle"></i> 创建助手</button>
    </div>
  </div>

  <div class="fs-prompt-overlay" id="fs-prompt-overlay">
    <div class="fs-prompt-head">
      <div class="fs-prompt-head-left">
        <button class="nav-btn" id="fs-prompt-close" title="返回"><i class="ph ph-arrow-left"></i></button>
        <span class="prompt-title">系统提示词</span>
        <div class="prompt-toolbar ml-16">
          <button id="fs-undo-btn" data-md="undo" title="撤销"><i class="ph ph-arrow-u-up-left"></i></button>
          <div class="tb-divider"></div>
          <button id="fs-redo-btn" data-md="redo" title="重做"><i class="ph ph-arrow-u-up-right"></i></button>
        </div>
      </div>
      <div class="fs-prompt-head-right">
        <div class="prompt-toolbar">
          <button id="fs-prompt-toggle-mode" title="纯文本模式"><i class="ph ph-file-text"></i></button>
        </div>
        <button id="fs-prompt-save" title="保存" class="btn-save-prompt"><i class="ph ph-floppy-disk"></i></button>
      </div>
    </div>
    <div class="fs-prompt-body">
      <div id="fs-prompt-vditor"></div>
      <textarea id="fs-prompt-raw-textarea" class="hidden" placeholder="输入纯文本系统提示词…"></textarea>
    </div>
  </div>

  <div class="dropdown-menu" id="dropdown-menu"></div>
  <div class="toast" id="toast"></div>
  <input type="file" id="import-file" accept=".json" class="hidden">
</div>
</body>
</html>
